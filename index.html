<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Workout Coach</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="background-glow"></div>
    <header>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
            <i data-lucide="moon" id="theme-icon"></i>
        </button>
        <div class="logo">
            <i data-lucide="dumbbell"></i>
            <h1>AI Workout Coach</h1>
        </div>
        <p>Your personalized workout plan, generated by AI.</p>
    </header>

    <main>
        <section id="body-metrics">
            <h2>Body Metrics Analysis</h2>
            <form id="metrics-form">
                <div class="metrics-grid">
                    <div class="form-group">
                        <label for="gender">Gender:</label>
                        <select id="gender" name="gender">
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="age">Age:</label>
                        <input type="number" id="age" name="age" placeholder="Years" required min="1" max="120">
                    </div>
                    <div class="form-group">
                        <label for="height">Height (cm):</label>
                        <input type="number" id="height" name="height" placeholder="cm" required min="50" max="250">
                    </div>
                    <div class="form-group">
                        <label for="weight">Weight (kg):</label>
                        <input type="number" id="weight" name="weight" placeholder="kg" required min="10" max="300">
                    </div>
                </div>
                <button type="submit" id="calculate-btn">Analyze My Body</button>
            </form>
            <div id="metrics-results" class="hidden">
                <div class="result-cards">
                    <div class="result-card">
                        <span class="result-label">BMI Index</span>
                        <span id="bmi-value" class="result-value">--</span>
                        <span id="bmi-status" class="result-status">--</span>
                    </div>
                    <div class="result-card">
                        <span class="result-label">Basal Metabolic Rate (BMR)</span>
                        <span id="bmr-value" class="result-value">--</span>
                        <span class="result-unit">kcal/day</span>
                    </div>
                </div>
            </div>
        </section>

        <form id="workout-form">
            <h2>Customize Your Workout</h2>
            <div class="form-group">
                <label for="fitness-level">Fitness Level:</label>
                <select id="fitness-level" name="fitness-level">
                    <option value="beginner">Beginner</option>
                    <option value="intermediate">Intermediate</option>
                    <option value="advanced">Advanced</option>
                </select>
            </div>
            <div class="form-group">
                <label for="goal">Workout Goal:</label>
                <select id="goal" name="goal">
                    <option value="weight-loss">Weight Loss</option>
                    <option value="muscle-gain">Muscle Gain</option>
                    <option value="general-fitness">General Fitness</option>
                </select>
            </div>
            <button type="submit">Generate Workout</button>
        </form>

        <section id="workout-plan">
            <h2>Your Custom Workout</h2>
            <div id="workout-container"></div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
